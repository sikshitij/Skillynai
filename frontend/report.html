<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillyn AI — Your Report Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <h1 class="logo">Skillyn <span>AI</span></h1>
        <button class="btn-outline" onclick="window.location.href='/dashboard.html'">New Interview</button>
    </nav>

    <div class="report-container">
        <h2>Your Interview Report Card 📊</h2>

        <!-- Score Overview -->
        <div class="score-overview">
            <div class="overall-score">
                <h3>Overall Readiness Score</h3>
                <div class="big-score" id="overall-score">—</div>
                <p id="overall-rating"></p>
            </div>
            <div class="score-chart">
                <canvas id="scoreChart"></canvas>
            </div>
        </div>

        <!-- Score Cards -->
        <div class="score-cards">
            <div class="score-card">
                <h4>Technical</h4>
                <div class="score-value" id="technical-score">—</div>
            </div>
            <div class="score-card">
                <h4>Confidence</h4>
                <div class="score-value" id="confidence-score">—</div>
            </div>
            <div class="score-card">
                <h4>SBR Structure</h4>
                <div class="score-value" id="sbr-score">—</div>
            </div>
            <div class="score-card">
                <h4>Communication</h4>
                <div class="score-value" id="communication-score">—</div>
            </div>
        </div>

        <!-- Career Roadmap -->
        <div class="roadmap-section">
            <h3>Your Personalized Career Roadmap 🗺️</h3>
            <div id="roadmap-content" class="roadmap-content">Loading roadmap...</div>
        </div>

        <!-- Question Feedback -->
        <div class="feedback-section">
            <h3>Question by Question Feedback 💬</h3>
            <div id="questions-feedback"></div>
        </div>

        <!-- Actions -->
        <div class="report-actions">
            <button class="btn-primary" onclick="downloadReport()">Download PDF Report 📄</button>
            <button class="btn-outline" onclick="window.location.href='/dashboard.html'">Practice Again 🔄</button>
        </div>
    </div>

    <script src="js/report.js"></script>
    <script>document.body.classList.add('page-enter')</script>
</body>
</html>
